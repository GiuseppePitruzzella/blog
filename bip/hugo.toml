baseURL = 'https://giuseppepitruzzella.github.io/bip/'
languageCode = 'en-us'
title = "Jax's Code Chronicles"
theme='hello-friend-ng'
paginate=10

[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  # Subtitle for home
  homeSubtitle = "Learning something new, every day. Unleash my potential as Developer."

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false

  # Enable sharing buttons, if you like
  enableSharingButtons = false

  [[params.social]]
    name="github"
    url="https://github.com/GiuseppePitruzzella"
  [[params.social]]
    name="leetcode"
    url="https://leetcode.com/jax-dev/"
  [[params.social]]
    name="instagram"
    url="https://www.instagram.com/giupitruzzella/" 
  
  # Show a global language switcher in the navigation bar
  enableGlobalLanguageMenu = true

  # Metadata mostly used in document's head
  description = "Learning something new, every day."
  keywords = "homepage, blog"
  images = [""]

[taxonomies]
    category = "blog"
    tag      = "tags"
    series   = "series"

[languages]
  [languages.en]
    title = "Jax's Code Chronicles"
    subtitle = "Learning something new, every day."
    keywords = ""
    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "$ cd /home/posts/"
      logoHomeLink = "/"
    # or
    #
    # path = "/img/your-example-logo.svg"
    # alt = "Jax Logo"

  # And you can even create generic menu
  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "/about"
  [[menu.main]]
    identifier = "blog"
    name       = "Articles"
    url        = "/posts"

